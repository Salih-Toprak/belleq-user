name: Publish image

# Builds the belleq-user image and pushes it to GitHub Container Registry
# (GHCR) so the master can pull it on demand when provisioning containers.
# No manual cloning/building on the host.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Use the docker-container (buildkit) driver. The default "docker" driver
      # plus provenance attestations causes "ERROR: unknown blob" when pushing
      # to GHCR; this step switches to a builder that pushes correctly.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Lowercased automatically -> ghcr.io/salih-toprak/belleq-user
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
